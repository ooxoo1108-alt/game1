<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>復健小遊戲-極限挑戰版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #001219; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; background: #caf0f8; }
    #ui { position: absolute; top: 10px; left: 10px; z-index: 10; padding: 8px; background: rgba(255,255,255,0.9); border-radius: 8px; }
    .score-board { font-size: 24px; font-weight: bold; color: #ae2012; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 25px; border-radius: 20px; text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 20; border: 4px solid #ae2012;
    }
    button { background: #ae2012; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 12px; cursor: pointer; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="ui"><div class="score-board">分數: <span id="score">0</span></div></div>
  <div id="msg-overlay">
    <h2>極限復健模式</h2>
    <p>請點擊按鈕進行兩步驟校準</p>
    <button id="start-btn">開始校準</button>
  </div>
  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let threshold = 0.1, currentMouthDist = 0, closeDist = 0, openDist = 0;
  // 速度大幅提升至 4.0，大幅縮短出現間隔
  let food = { x: 0, y: -50, radius: 40, active: false, speed: 4.0, delayCounter: 0 };

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    });
  }

  startBtn.onclick = () => {
    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      startBtn.innerText = "擷取「閉嘴」數值";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeDist = currentMouthDist;
      gameState = "CALIBRATING_OPEN";
      startBtn.innerText = "擷取「最開」數值";
    } else if (gameState === "CALIBRATING_OPEN") {
      openDist = currentMouthDist;
      // 極限門檻：必須達到 95% 的張開度
      threshold = closeDist + (openDist - closeDist) * 0.95; 
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentMouthDist = Math.abs(results.faceLandmarks[0][13].y - results.faceLandmarks[0][14].y);
