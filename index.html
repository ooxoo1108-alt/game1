<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>口腔復健-數據可視化版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; }
    
    #ui { position: absolute; top: 15px; left: 15px; z-index: 100; padding: 12px; background: rgba(255,255,255,0.9); border-radius: 15px; border: 2px solid #0288d1; }
    
    /* 數值即時監控表 */
    #monitor { position: absolute; top: 15px; right: 15px; z-index: 100; background: rgba(0,0,0,0.7); color: #0f0; padding: 10px; font-family: monospace; border-radius: 10px; font-size: 14px; }

    #side-controls { 
      position: absolute; left: 15px; top: 55%; transform: translateY(-50%); 
      z-index: 200; display: flex; flex-direction: column; gap: 20px;
    }
    .adjust-btn { 
      width: 70px; height: 70px; border-radius: 50%; border: 4px solid white; 
      font-size: 35px; font-weight: bold; color: white; cursor: pointer;
    }
    #btn-plus { background: #4caf50; } 
    #btn-minus { background: #f44336; } 

    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 30px; border-radius: 25px; text-align: center;
      z-index: 300; border: 4px solid #0288d1; min-width: 280px;
    }
    #start-btn { background: #0288d1; color: white; border: none; padding: 15px 40px; font-size: 22px; border-radius: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="ui">分數: <span id="score" style="font-size:24px; font-weight:bold;">0</span></div>
  
  <div id="monitor">
    即時開合度: <span id="cur-v">0.00</span><br>
    當前門檻值: <span id="thr-v">0.50</span>
  </div>

  <div id="side-controls">
    <button id="btn-plus" class="adjust-btn">＋</button>
    <button id="btn-minus" class="adjust-btn">－</button>
    <div style="color:white; font-size:12px; text-align:center; background:rgba(0,0,0,0.5)">
      點 [-] 解決自動張嘴
    </div>
  </div>

  <div id="msg-overlay">
    <h2>🍔 食物急速挑戰 🍓</h2>
    <p>校準完若自動張嘴，請猛點左側 [－]</p>
    <button id="start-btn">開始校準</button>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const curVEl = document.getElementById("cur-v");
  const thrVEl = document.getElementById("thr-v");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let currentRatio = 0, closeRatio = 0, openRatio = 0;
  let sensitivityOffset = 1.0; 
  let finalThreshold = 0.5;

  const foodIcons = ["🍔", "🍟", "🍕", "🍰", "🍓", "🍩", "🍦", "🍎"];
  let food = { x: 0, y: -50, active: false, speed: 5.5, icon: "🍔", delayCounter: 0 };

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.onloadedmetadata = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; render(); };
  }

  function getMouthRatio(marks) {
    const v = Math.abs(marks[13].y - marks[14].y);
    const h = Math.abs(marks[78].x - marks[308].x);
    return v / h;
  }

  // 暴力調整邏輯：直接改門檻
  document.getElementById("btn-plus").onclick = () => { sensitivityOffset -= 0.2; updateThreshold(); };
  document.getElementById("btn-minus").onclick = () => { sensitivityOffset += 0.2; updateThreshold(); };

  function updateThreshold() {
    // 門檻 = 閉嘴值 + (張嘴差距 * 偏移量)
    finalThreshold = closeRatio + (openRatio - closeRatio) * sensitivityOffset;
    thrVEl.innerText = finalThreshold.toFixed(3);
  }

  startBtn.onclick = () => {
    if (gameState === "LOADING") {
      gameState = "CAL_CLOSE";
      startBtn.innerText = "擷取閉嘴狀態";
    } else if (gameState === "CAL_CLOSE") {
      closeRatio = currentRatio;
      gameState = "CAL_OPEN";
      startBtn.innerText = "擷取大張嘴狀態";
    } else if (gameState === "CAL_OPEN") {
      openRatio = currentRatio;
      updateThreshold();
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentRatio = getMouthRatio(results.faceLandmarks[0]);
      curVEl.innerText = currentRatio.toFixed(3);
      
      // 判定逻辑
      if (gameState === "PLAYING") {
        isMouthOpen = (currentRatio > finalThreshold);
      }
      drawMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawMouth(open) {
    const w = canvas.width, h = canvas.height;
    const mouthW = w * 0.8, mouthH = open ? h * 0.2 : h * 0.04;
    const centerY = h - 120;
    ctx.fillStyle = open ? "#880e4f" : "#ad1457";
    ctx.beginPath(); ctx.ellipse(w/2, centerY, mouthW/2, mouthH, 0, 0, Math.PI * 2); ctx.fill();
    if(open) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 8; ctx.stroke(); }
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      if (food.delayCounter > 40) { 
        food.x = Math.random() * (canvas.width - 100) + 50;
        food.y = -50; food.icon = foodIcons[Math.floor(Math.random() * foodIcons.length)];
        food.active = true; food.delayCounter = 0;
      }
      return;
    }
    food.y += food.speed;
    ctx.font = "60px serif"; ctx.textAlign = "center";
    ctx.fillText(food.icon, food.x, food.y);

    if (food.y > canvas.height - 180 && isMouthOpen && food.active) {
        score += 10; scoreEl.innerText = score; food.active = false;
        if (navigator.vibrate) navigator.vibrate(50);
    }
    if (food.y > canvas.height) food.active = false;
  }
  init();
</script>
</body>
</html>
