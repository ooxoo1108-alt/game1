<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>復健小遊戲-進階版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Microsoft JhengHei', sans-serif; background: #a2d2ff; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; background: linear-gradient(to bottom, #a2d2ff 0%, #ffffff 100%); }
    #ui { position: absolute; top: 20px; left: 20px; z-index: 10; }
    .score-board { font-size: 32px; font-weight: bold; color: #003049; text-shadow: 1px 1px 2px white; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px;
      text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 20; min-width: 280px;
    }
    button { background: #ff4d6d; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 15px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    #status { font-size: 14px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="score-board">得分: <span id="score">0</span></div>
    <div id="status">系統初始化中...</div>
  </div>
  <div id="msg-overlay">
    <h2 id="msg-title">口腔復健練習</h2>
    <p id="msg-text">點擊下方按鈕開始校準</p>
    <button id="start-btn">開始校準</button>
  </div>
  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const statusEl = document.getElementById("status");
  const msgTitle = document.getElementById("msg-title");
  const msgText = document.getElementById("msg-text");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");

  let faceLandmarker;
  let score = 0;
  let gameState = "LOADING"; 
  let threshold = 0.06; 
  let currentMouthDist = 0;
  let food = { x: 0, y: -100, radius: 30, active: false, speed: 2, delayCounter: 0 };
  let closeDist = 0, openDist = 0;

  async function init() {
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
        runningMode: "VIDEO", numFaces: 1
      });
      statusEl.innerText = "模型載入成功，請開啟相機";
      startCamera();
    } catch(e) { statusEl.innerText = "載入失敗，請檢查網路"; }
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      statusEl.innerText = "相機已就緒";
      render();
    });
  }

  startBtn.onclick = () => {
    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      msgTitle.innerText = "步驟一：放鬆";
      msgText.innerText = "請病人「輕輕閉嘴」放鬆肌肉";
      startBtn.innerText = "確定 (擷取閉嘴數值)";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeDist = currentMouthDist;
      gameState = "CALIBRATING_OPEN";
      msgTitle.innerText = "步驟二：出力";
      msgText.innerText = "請病人「盡力張嘴」到最開";
      startBtn.innerText = "確定 (擷取最大數值)";
    } else if (gameState === "CALIBRATING_OPEN") {
      openDist = currentMouthDist;
      // 關鍵門檻調整：從 50% 提高到 70% 的張開程度才算得分
      threshold = closeDist + (openDist - closeDist) * 0.7; 
      gameState = "PLAYING";
      overlay.style.display = "none";
      statusEl.innerText = "練習進行中";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      const marks = results.faceLandmarks[0];
      // 計算上下唇垂直距離
      currentMouthDist = Math.abs(marks[13].y - marks[14].y);
      isMouthOpen = currentMouthDist > threshold;
      drawMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawMouth(open) {
    // 繪製更大的嘴巴視覺
    const mouthWidth = 140;
    const mouthHeight = open ? 90 : 25;
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height - 120);
    
    // 外唇
    ctx.fillStyle = open ? "#ff758f" : "#c9184a";
    ctx.beginPath();
    ctx.ellipse(0, 0, mouthWidth, mouthHeight, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 內口 (增加層次感)
    if(open) {
      ctx.fillStyle = "#590d22";
      ctx.beginPath();
      ctx.ellipse(0, 0, mouthWidth - 20, mouthHeight - 15, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      // 加入掉落間隔，約 2 秒掉一次
      if (food.delayCounter > 120) { 
        food.x = Math.random() * (canvas.width - 150) + 75;
        food.y = -50;
        food.active = true;
        food.speed = 2.5; // 調慢掉落速度
        food.delayCounter = 0;
      }
      return;
    }

    food.y += food.speed;
    
    // 繪製食物 (橘色圓球)
    ctx.fillStyle = "#fb8500";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // 碰撞偵測 (當食物進入嘴巴範圍)
    if (food.y > canvas.height - 180 && food.y < canvas.height - 80) {
      if (Math.abs(food.x - canvas.width / 2) < 100 && isMouthOpen) {
        score += 10;
        scoreEl.innerText = score;
        food.active = false;
        // 吃到後震動反饋 (若手機支援)
        if (navigator.vibrate) navigator.vibrate(50);
      }
    }
    if (food.y > canvas.height) food.active = false;
  }
  init();
</script>
</body>
</html>
