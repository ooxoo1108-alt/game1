<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>口腔復健-藍天白雲版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; }
    #video { visibility: hidden; position: absolute; }
    /* 藍天白雲背景漸層 */
    #gameCanvas { 
      width: 100vw; height: 100vh; display: block; 
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%); 
    }
    #ui { position: absolute; top: 15px; left: 15px; z-index: 10; padding: 12px; background: rgba(255,255,255,0.8); border-radius: 15px; border: 2px solid #fff; }
    .score-board { font-size: 28px; font-weight: bold; color: #0277bd; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 35px; border-radius: 30px; text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 20; border: 5px solid #87CEEB; min-width: 300px;
    }
    button { background: #0277bd; color: white; border: none; padding: 18px 45px; font-size: 24px; border-radius: 20px; cursor: pointer; margin-top: 25px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="ui"><div class="score-board">得分: <span id="score">0</span></div></div>
  <div id="msg-overlay">
    <h2 id="msg-title">口腔復健練習</h2>
    <p id="msg-text">在藍天白雲下開始練習吧！</p>
    <button id="start-btn">開始校準</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");
  const msgText = document.getElementById("msg-text");
  const bgMusic = document.getElementById("bgMusic");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let threshold = 0.5, currentRatio = 0, closeRatio = 0, openRatio = 0;
  
  // 速度調至極慢 1.2
  let food = { x: 0, y: -50, radius: 45, active: false, speed: 1.2, delayCounter: 0 };
  
  // 增加判定嚴格度：連續 10 影格
  let openFrames = 0;
  const REQUIRED_FRAMES = 10; 

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    });
  }

  function getMouthRatio(marks) {
    const vertical = Math.abs(marks[13].y - marks[14].y);
    const horizontal = Math.abs(marks[78].x - marks[308].x);
    return vertical / horizontal;
  }

  startBtn.onclick = () => {
    // 播放音樂 (瀏覽器限制必須由使用者觸發)
    bgMusic.play().catch(() => console.log("Music wait for interaction"));

    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      msgText.innerText = "請「輕輕閉嘴」維持放鬆";
      startBtn.innerText = "好了，擷取閉嘴";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeRatio = currentRatio;
      gameState = "CALIBRATING_OPEN";
      msgText.innerText = "請「盡力張大嘴巴」到最開";
      startBtn.innerText = "好了，擷取張嘴";
    } else if (gameState === "CALIBRATING_OPEN") {
      openRatio = currentRatio;
      threshold = closeRatio + (openRatio - closeRatio) * 0.85; 
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 繪製簡單的白雲
    drawClouds();

    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentRatio = getMouthRatio(results.faceLandmarks[0]);
      
      // 判定強化：必須超過門檻且大於閉嘴基準 1.8 倍
      if (currentRatio > threshold && currentRatio > closeRatio * 1.8) {
        openFrames++;
      } else {
        openFrames = 0;
      }
      
      isMouthOpen = (openFrames >= REQUIRED_FRAMES);
      drawMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawClouds() {
    ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
    // 簡單畫幾朵雲裝飾
    ctx.beginPath(); ctx.arc(100, 100, 40, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(140, 100, 50, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(180, 100, 40, 0, Math.PI*2); ctx.fill();
  }

  function drawMouth(open) {
    const w = canvas.width, h = canvas.height;
    const mouthW = w * 0.8;
    const mouthH = open ? h * 0.22 : h * 0.05;
    const centerY = h - (h * 0.15);

    ctx.fillStyle = open ? "#0277bd" : "#81d4fa";
    ctx.beginPath();
    ctx.ellipse(w/2, centerY, mouthW/2, mouthH, 0, 0, Math.PI * 2);
    ctx.fill();
    
    if(open) {
        ctx.strokeStyle = "white";
        ctx.lineWidth = 5;
        ctx.stroke();
    }
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      if (food.delayCounter > 180) { 
        food.x = Math.random() * (canvas.width - 150) + 75;
        food.y = -50;
        food.active = true;
        food.delayCounter = 0;
      }
      return;
    }

    food.y += food.speed;
    ctx.fillStyle = "#ffb300";
    ctx.beginPath(); ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2); ctx.fill();

    if (food.y > canvas.height * 0.7 && isMouthOpen && food.active) {
        score += 10;
        scoreEl.innerText = score;
        food.active = false;
        if (navigator.vibrate) navigator.vibrate(5
