<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>復健小遊戲-精準校準版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; background: linear-gradient(to bottom, #caf0f8, #f0faff); }
    #ui { position: absolute; top: 10px; left: 10px; z-index: 10; padding: 10px; background: rgba(255,255,255,0.9); border-radius: 12px; }
    .score-board { font-size: 28px; font-weight: bold; color: #0077b6; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 30px; border-radius: 25px; text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 20; border: 5px solid #0077b6; min-width: 280px;
    }
    button { background: #0077b6; color: white; border: none; padding: 15px 35px; font-size: 22px; border-radius: 15px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    #debug { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 12px; background: rgba(0,0,0,0.5); }
  </style>
</head>
<body>
  <div id="ui"><div class="score-board">分數: <span id="score">0</span></div></div>
  <div id="msg-overlay">
    <h2 id="msg-title">精準復健模式</h2>
    <p id="msg-text">點擊按鈕開始校準</p>
    <button id="start-btn">開始校準</button>
  </div>
  <div id="debug"></div>
  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");
  const msgText = document.getElementById("msg-text");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let threshold = 0.5, currentRatio = 0, closeRatio = 0, openRatio = 0;
  // 速度放慢至 2.5，適合復健節奏
  let food = { x: 0, y: -50, radius: 40, active: false, speed: 2.5, delayCounter: 0 };

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    });
  }

  function getMouthRatio(marks) {
    const vertical = Math.abs(marks[13].y - marks[14].y);
    const horizontal = Math.abs(marks[78].x - marks[308].x);
    return vertical / horizontal;
  }

  startBtn.onclick = () => {
    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      msgText.innerText = "請病人「完全閉上嘴巴」並保持不動";
      startBtn.innerText = "好了，擷取閉嘴狀態";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeRatio = currentRatio;
      gameState = "CALIBRATING_OPEN";
      msgText.innerText = "請病人「盡量張大嘴巴」到最開";
      startBtn.innerText = "好了，擷取張嘴極限";
    } else if (gameState === "CALIBRATING_OPEN") {
      openRatio = currentRatio;
      // 設定一個更嚴謹的門檻：必須張開到 (最開 - 閉嘴) 差距的 80%
      threshold = closeRatio + (openRatio - closeRatio) * 0.8; 
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentRatio = getMouthRatio(results.faceLandmarks[0]);
      // 只有當前比例超過門檻，且明顯大於閉嘴狀態時才判定張開
      isMouthOpen = (currentRatio > threshold) && (currentRatio > closeRatio * 1.2);
      drawMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawMouth(open) {
    const w = canvas.width, h = canvas.height;
    const mouthW = w * 0.85;
    const mouthH = open ? h * 0.25 : h * 0.08;
    const centerY = h - (h * 0.15);

    ctx.fillStyle = open ? "#660708" : "#9b2226";
    ctx.beginPath();
    ctx.ellipse(w/2, centerY, mouthW/2, mouthH, 0, 0, Math.PI * 2);
    ctx.fill();
    
    if(open) {
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 8;
        ctx.stroke();
    }
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      if (food.delayCounter > 120) { // 約 2 秒出現一次
        food.x = Math.random() * (canvas.width - 120) + 60;
        food.y = -50;
        food.active = true;
        food.delayCounter = 0;
      }
      return;
    }

    food.y += food.speed;
    ctx.fillStyle = "#fb8500";
    ctx.beginPath(); ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2); ctx.fill();

    if (food.y > canvas.height * 0.7 && isMouthOpen && food.active) {
        score += 10;
        scoreEl.innerText = score;
        food.active = false;
        if (navigator.vibrate) navigator.vibrate(50);
    }
    if (food.y > canvas.height) food.active = false;
  }
  init();
</script>
</body>
</html>
