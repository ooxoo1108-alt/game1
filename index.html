<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>口腔復健-美食挑戰版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; }
    #ui { position: absolute; top: 15px; left: 15px; z-index: 10; padding: 12px; background: rgba(255,255,255,0.9); border-radius: 15px; border: 2px solid #0288d1; }
    .score-board { font-size: 26px; font-weight: bold; color: #d81b60; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 30px; border-radius: 25px; text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 20; border: 4px solid #0288d1; min-width: 280px;
    }
    button { background: #0288d1; color: white; border: none; padding: 15px 40px; font-size: 22px; border-radius: 20px; cursor: pointer; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="ui"><div class="score-board">得分: <span id="score">0</span></div></div>
  <div id="msg-overlay">
    <h2>🍔 美食挑戰模式 🍓</h2>
    <p id="msg-text">點擊開始，挑戰極速餵食！</p>
    <button id="start-btn">開始 (音效解鎖)</button>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let threshold = 0.5, currentRatio = 0, closeRatio = 0, openRatio = 0;
  
  // 速度加快至 4.5
  const foodIcons = ["🍔", "🍟", "🍕", "🍣", "🍓", "🍩", "🍦", "🍎"];
  let food = { x: 0, y: -50, size: 50, active: false, speed: 4.5, icon: "🍔", delayCounter: 0 };
  let openFrames = 0;
  const REQUIRED_FRAMES = 3; 

  // 音訊上下文
  let audioCtx = null;

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  function playScoreSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 輕脆聲
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    });
  }

  function getMouthRatio(marks) {
    const vertical = Math.abs(marks[13].y - marks[14].y);
    const horizontal = Math.abs(marks[78].x - marks[308].x);
    return vertical / horizontal;
  }

  startBtn.onclick = () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      document.getElementById("msg-text").innerText = "步驟 1：請用力「抿嘴閉緊」";
      startBtn.innerText = "擷取閉嘴狀態";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeRatio = currentRatio;
      gameState = "CALIBRATING_OPEN";
      document.getElementById("msg-text").innerText = "步驟 2：請「張嘴到最大」";
      startBtn.innerText = "擷取張嘴狀態";
    } else if (gameState === "CALIBRATING_OPEN") {
      openRatio = currentRatio;
      threshold = closeRatio + (openRatio - closeRatio) * 0.95; 
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    // 藍天白雲
    const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grd.addColorStop(0, "#4fc3f7"); grd.addColorStop(1, "#ffffff");
    ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawCloud(canvas.width * 0.2, 100, 40); drawCloud(canvas.width * 0.7, 180, 50);

    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentRatio = getMouthRatio(results.faceLandmarks[0]);
      if (currentRatio > threshold && currentRatio > closeRatio * 3.0) {
        openFrames++;
      } else { openFrames = 0; }
      isMouthOpen = (openFrames >= REQUIRED_FRAMES);
      drawMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawCloud(x, y, s) {
    ctx.fillStyle = "white"; ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI*2); ctx.arc(x+s*0.8, y-s*0.3, s*1.0, 0, Math.PI*2); ctx.arc(x+s*1.6, y, s, 0, Math.PI*2); ctx.fill();
  }

  function drawMouth(open) {
    const w = canvas.width, h = canvas.height;
    const mouthW = w * 0.9, mouthH = open ? h * 0.25 : h * 0.05;
    const centerY = h - (h * 0.15);
    ctx.fillStyle = open ? "#880e4f" : "#ad1457";
    ctx.beginPath(); ctx.ellipse(w/2, centerY, mouthW/2, mouthH, 0, 0, Math.PI * 2); ctx.fill();
    if(open) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 10; ctx.stroke(); }
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      if (food.delayCounter > 50) { 
        food.x = Math.random() * (canvas.width - 100) + 50;
        food.y = -50; 
        food.icon = foodIcons[Math.floor(Math.random
