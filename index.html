<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>復健小遊戲</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #a2d2ff; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; }
    #ui { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 24px; font-weight: bold; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 20px; border-radius: 20px; text-align: center; z-index: 20;
    }
    button { background: #ff4d6d; color: white; border: none; padding: 10px 20px; font-size: 18px; border-radius: 10px; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="ui">分數: <span id="score">0</span></div>
  <div id="msg-overlay">
    <h2 id="msg-title">口腔復健遊戲</h2>
    <p id="msg-text">點擊下方按鈕開始校準</p>
    <button id="start-btn">開始校準</button>
  </div>
  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const msgTitle = document.getElementById("msg-title");
  const msgText = document.getElementById("msg-text");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");

  let faceLandmarker;
  let score = 0;
  let gameState = "LOADING";
  let threshold = 0.05;
  let currentMouthDist = 0;
  let food = { x: 0, y: -50, radius: 25, active: false, speed: 3 };
  let closeDist = 0, openDist = 0;

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    });
  }

  startBtn.onclick = () => {
    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      msgTitle.innerText = "第一步：閉嘴";
      msgText.innerText = "請放鬆閉上嘴巴，按確定";
      startBtn.innerText = "我閉好了";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeDist = currentMouthDist;
      gameState = "CALIBRATING_OPEN";
      msgTitle.innerText = "第二步：張嘴";
      msgText.innerText = "請盡量張大嘴巴，按確定";
      startBtn.innerText = "我張好了";
    } else if (gameState === "CALIBRATING_OPEN") {
      openDist = currentMouthDist;
      threshold = (closeDist + openDist) / 1.8;
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;
    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      const marks = results.faceLandmarks[0];
      currentMouthDist = Math.abs(marks[13].y - marks[14].y);
      isMouthOpen = currentMouthDist > threshold;
      drawMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawMouth(open) {
    ctx.fillStyle = open ? "#ff758f" : "#c9184a";
    ctx.beginPath();
    ctx.ellipse(canvas.width / 2, canvas.height - 100, 100, open ? 60 : 20, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.x = Math.random() * (canvas.width - 100) + 50;
      food.y = -50;
      food.active = true;
      food.speed = 2 + Math.random() * 2;
    }
    food.y += food.speed;
    ctx.fillStyle = "#fb8500";
    ctx.beginPath();
    ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2);
    ctx.fill();
    if (food.y > canvas.height - 130 && food.y < canvas.height - 70 && food.active) {
      if (Math.abs(food.x - canvas.width / 2) < 80 && isMouthOpen) {
        score += 10;
        scoreEl.innerText = score;
        food.active = false;
      }
    }
    if (food.y > canvas.height) food.active = false;
  }
  init();
</script>
</body>
</html>
