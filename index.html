<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>復健小遊戲-進階優化</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Microsoft JhengHei', sans-serif; background: #a2d2ff; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; background: linear-gradient(to bottom, #89c2d9 0%, #ffffff 100%); }
    #ui { position: absolute; top: 20px; left: 20px; z-index: 10; padding: 10px; background: rgba(255,255,255,0.7); border-radius: 10px; }
    .score-board { font-size: 32px; font-weight: bold; color: #013a63; text-shadow: 1px 1px 1px white; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 40px; border-radius: 30px; text-align: center;
      box-shadow: 0 15px 50px rgba(0,0,0,0.15); z-index: 20; min-width: 320px;
    }
    button { background: #d00000; color: white; border: none; padding: 20px 40px; font-size: 24px; border-radius: 20px; cursor: pointer; margin-top: 30px; font-weight: bold; text-shadow: 0 2px 2px rgba(0,0,0,0.2); }
    #status { font-size: 16px; color: #666; margin-top: 15px; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="score-board">得分: <span id="score">0</span></div>
    <div id="status">系統初始化中...</div>
  </div>
  <div id="msg-overlay">
    <h2 id="msg-title">口腔復健練習</h2>
    <p id="msg-text">點擊下方按鈕開始校準</p>
    <button id="start-btn">開始校準</button>
  </div>
  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const statusEl = document.getElementById("status");
  const msgTitle = document.getElementById("msg-title");
  const msgText = document.getElementById("msg-text");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let threshold = 0.08, currentMouthDist = 0, closeDist = 0, openDist = 0;
  // 食物參數：速度慢，增加延遲計數器
  let food = { x: 0, y: -100, radius: 40, active: false, speed: 1.5, delayCounter: 100 };

  async function init() {
    try {
      const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
        runningMode: "VIDEO", numFaces: 1
      });
      statusEl.innerText = "模型載入成功，請開啟相機";
      startCamera();
    } catch(e) { statusEl.innerText = "載入失敗，請檢查網路"; }
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      statusEl.innerText = "相機已就緒";
      render();
    });
  }

  startBtn.onclick = () => {
    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      msgTitle.innerText = "步驟一：放鬆";
      msgText.innerText = "請病人輕輕閉嘴，放鬆肌肉";
      startBtn.innerText = "確定 (擷取數值)";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeDist = currentMouthDist;
      gameState = "CALIBRATING_OPEN";
      msgTitle.innerText = "步驟二：用力";
      msgText.innerText = "請病人盡全力張嘴到最開！";
      startBtn.innerText = "確定 (擷取最開數值)";
    } else if (gameState === "CALIBRATING_OPEN") {
      openDist = currentMouthDist;
      // 關鍵門檻：從之前的 70% 提高到極高的 90%
      threshold = closeDist + (openDist - closeDist) * 0.9; 
      gameState = "PLAYING";
      overlay.style.display = "none";
      statusEl.innerText = "練習進行中";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentMouthDist = Math.abs(results.faceLandmarks[0][13].y - results.faceLandmarks[0][14].y);
      isMouthOpen = currentMouthDist > threshold;
      drawGiantMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  // 繪製一個佔滿底部的巨大圖形化嘴巴
  function drawGiantMouth(open) {
    const mouthBottom = canvas.height - 30;
    const mouthTop = open ? canvas.height - 250 : canvas.height - 100;
    const mouthWidth = canvas.width;
    const centerX = canvas.width / 2;

    ctx.save();
    // 嘴唇邊緣
    ctx.fillStyle = "#a4161a";
    ctx.beginPath();
    ctx.ellipse(centerX, mouthBottom - 100, mouthWidth * 0.5, open ? 150 : 80, 0, 0, Math.PI * 2);
    ctx.fill();

    // 口腔內部 (巨大開口)
    if(open) {
      ctx.fillStyle = "#660708";
      ctx.beginPath();
      ctx.ellipse(centerX, mouthBottom - 100, mouthWidth * 0.45, 130, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // 牙齒裝飾 (上排)
      ctx.fillStyle = "white";
      for(let i=0; i<8; i++) {
        ctx.fillRect(canvas.width * (0.2 + i * 0.08), canvas.height - 230, 20, 25);
      }
    }
    ctx.restore();
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      // 增加延遲，約 4 秒掉一次
      if (food.delayCounter > 240) { 
        food.x = Math.random() * (canvas.width - 200) + 100;
        food.y = - food.radius; // 食物更大
        food.active = true;
        food.delayCounter = 0;
      }
      return;
    }

    food.y += food.speed;
    
    // 繪製食物 (橘色大橘子)
    ctx.fillStyle = "#fb8500";
    ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0,0,0,0.3)";
    ctx.beginPath(); ctx.arc(food.x, food.y, food.radius, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;

    // 碰撞偵測 (食物掉到底部且嘴巴張開)
    if (food.y > canvas.height - 230 && food.active && isMouthOpen) {
        score += 10;
        scoreEl.innerText = score;
        food.active = false;
        //吃到食物時重置空白期計數器
        food.delayCounter = 0;
        if (navigator.vibrate) navigator.vibrate(100);
    }

    if (food.y > canvas.height) food.active = false;
  }
  init();
</script>
</body>
</html>
