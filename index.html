<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>口腔復健</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #87CEEB; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; }
    
    #ui { position: absolute; top: 15px; left: 15px; z-index: 100; padding: 12px; background: rgba(255,255,255,0.9); border-radius: 15px; border: 3px solid #0288d1; }
    #monitor { position: absolute; top: 15px; right: 15px; z-index: 100; background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px; font-family: monospace; border-radius: 10px; font-size: 12px; line-height: 1.4; }

    #side-controls { 
      position: absolute; left: 20px; top: 50%; transform: translateY(-50%); 
      z-index: 200; display: flex; flex-direction: column; gap: 20px;
    }
    .adjust-btn { 
      width: 75px; height: 75px; border-radius: 50%; border: 4px solid white; 
      font-size: 40px; font-weight: bold; color: white; cursor: pointer;
      box-shadow: 0 6px 15px rgba(0,0,0,0.4); active { transform: scale(0.9); }
    }
    #btn-plus { background: #4caf50; } /* + 號：變容易 */
    #btn-minus { background: #f44336; } /* - 號：變困難（解決自動張嘴） */

    #msg-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 1000; text-align: center;
    }
    #start-btn { background: #0288d1; color: white; border: none; padding: 25px 60px; font-size: 28px; border-radius: 40px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(2,136,209,0.4); }
  </style>
</head>
<body>
  <div id="ui">分數: <span id="score" style="font-size:26px; font-weight:bold;">0</span></div>
  
  <div id="monitor">
    即時數值: <span id="cur-v">0.00</span><br>
    判定門檻: <span id="thr-v">0.30</span><br>
    <span style="color:#ffeb3b">如果嘴巴自動張開<br>請連按下方紅色 [-]</span>
  </div>

  <div id="side-controls">
    <button id="btn-plus" class="adjust-btn">＋</button>
    <button id="btn-minus" class="adjust-btn">－</button>
  </div>

  <div id="msg-overlay">
    <h1 style="color:#0288d1; font-size: 32px;">口腔復健練習</h1>
    <p style="color:#666; margin-bottom: 30px; font-size: 18px;" id="msg-text">點擊按鈕後將開始校準<br>並同步播放背景音樂</p>
    <button id="start-btn">開始校準</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://assets.mixkit.co/music/preview/mixkit-sunny-day-13.mp3" type="audio/mpeg">
  </audio>

  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const curVEl = document.getElementById("cur-v");
  const thrVEl = document.getElementById("thr-v");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");
  const bgMusic = document.getElementById("bgMusic");
  const msgText = document.getElementById("msg-text");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let currentRatio = 0, finalThreshold = 0.3;

  const foodIcons = ["🍔", "🍟", "🍕", "🍰", "🍓", "🍩", "🍦", "🍎"];
  let food = { x: 0, y: -50, active: false, speed: 6.0, icon: "🍔", delayCounter: 0 };

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.onloadedmetadata = () => { 
      canvas.width = window.innerWidth; 
      canvas.height = window.innerHeight; 
      render(); 
    };
  }

  function getMouthRatio(marks) {
    const v = Math.abs(marks[13].y - marks[14].y);
    const h = Math.abs(marks[78].x - marks[308].x);
    return v / h;
  }

  // 暴力調整：直接強制修改 finalThreshold
  document.getElementById("btn-plus").onclick = () => { finalThreshold -= 0.05; updateUI(); };
  document.getElementById("btn-minus").onclick = () => { finalThreshold += 0.05; updateUI(); };

  function updateUI() {
    if (finalThreshold < 0.01) finalThreshold = 0.01;
    thrVEl.innerText = finalThreshold.toFixed(3);
  }

  startBtn.onclick = () => {
    bgMusic.play().catch(() => {});
    if (gameState === "LOADING") {
      gameState = "CAL_CLOSE";
      msgText.innerHTML = "請保持「<strong>閉嘴、抿嘴</strong>」狀態";
      startBtn.innerText = "擷取閉嘴數據";
    } else if (gameState === "CAL_CLOSE") {
      gameState = "CAL_OPEN";
      msgText.innerHTML = "請保持「<strong>張大嘴巴</strong>」狀態";
      startBtn.innerText = "擷取張嘴數據";
    } else if (gameState === "CAL_OPEN") {
      gameState = "PLAYING";
      overlay.style.display = "none";
      updateUI();
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentRatio = getMouthRatio(results.faceLandmarks[0]);
      curVEl.innerText = currentRatio.toFixed(3);
      if (gameState === "PLAYING") {
        isMouthOpen = (currentRatio > finalThreshold);
      }
    }

    // 背景色處理
    ctx.fillStyle = isMouthOpen ? "#B2EBF2" : "#87CEEB"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawMouth(isMouthOpen);
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawMouth(open) {
    const w = canvas.width, h = canvas.height;
    const mouthW = w * 0.8, mouthH = open ? h * 0.18 : h * 0.04;
    const centerY = h - 150;
    ctx.fillStyle = open ? "#880e4f" : "#ad1457";
    ctx.beginPath(); ctx.ellipse(w/2, centerY, mouthW/2, mouthH, 0, 0, Math.PI * 2); ctx.fill();
    if(open) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 10; ctx.stroke(); }
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      if (food.delayCounter > 35) { 
        food.x = Math.random() * (canvas.width - 120) + 60;
        food.y = -50; 
        food.icon = foodIcons[Math.floor(Math.random() * foodIcons.length)];
        food.active = true; food.delayCounter = 0;
      }
      return;
    }
    food.y += food.speed;
    ctx.font = "65px serif"; ctx.textAlign = "center";
    ctx.fillText(food.icon, food.x, food.y);

    if (food.y > canvas.height - 200 && isMouthOpen && food.active) {
        score += 10; scoreEl.innerText = score; food.active = false;
        if (navigator.vibrate) navigator.vibrate(60);
    }
    if (food.y > canvas.height) food.active = false;
  }
  init();
</script>
</body>
</html>
