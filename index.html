<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>復健小遊戲-黃金平衡版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; background: #87CEEB; }
    #video { visibility: hidden; position: absolute; }
    #gameCanvas { width: 100vw; height: 100vh; display: block; }
    #ui { position: absolute; top: 15px; left: 15px; z-index: 10; padding: 12px; background: rgba(255,255,255,0.9); border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .score-board { font-size: 26px; font-weight: bold; color: #0277bd; }
    #msg-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 30px; border-radius: 25px; text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 20; border: 4px solid #0277bd; min-width: 280px;
    }
    button { background: #0277bd; color: white; border: none; padding: 15px 40px; font-size: 22px; border-radius: 20px; cursor: pointer; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="ui"><div class="score-board">分數: <span id="score">0</span></div></div>
  <div id="msg-overlay">
    <h2 id="msg-title">口腔復健 (黃金平衡)</h2>
    <p id="msg-text">點擊開始，跟著藍天白雲練習</p>
    <button id="start-btn">開始練習</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Ketsa/Light_Reflections/Ketsa_-_04_-_Thinking_Free.mp3" type="audio/mpeg">
  </audio>

  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");
  const bgMusic = document.getElementById("bgMusic");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let threshold = 0.5, currentRatio = 0, closeRatio = 0, openRatio = 0;
  
  // 速度平衡至 1.8，間隔縮短一點讓節奏更順
  let food = { x: 0, y: -50, radius: 40, active: false, speed: 1.8, delayCounter: 0 };
  let openFrames = 0;
  const REQUIRED_FRAMES = 6; // 反應快一點，但配合嚴格門檻

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.addEventListener("loadeddata", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    });
  }

  function getMouthRatio(marks) {
    const vertical = Math.abs(marks[13].y - marks[14].y);
    const horizontal = Math.abs(marks[78].x - marks[308].x);
    return vertical / horizontal;
  }

  startBtn.onclick = () => {
    bgMusic.play().catch(e => console.log("Audio play deferred"));
    if (gameState === "LOADING") {
      gameState = "CALIBRATING_CLOSE";
      document.getElementById("msg-text").innerText = "步驟 1：請「抿嘴閉緊」";
      startBtn.innerText = "擷取閉嘴";
    } else if (gameState === "CALIBRATING_CLOSE") {
      closeRatio = currentRatio;
      gameState = "CALIBRATING_OPEN";
      document.getElementById("msg-text").innerText = "步驟 2：請「張嘴到最大」";
      startBtn.innerText = "擷取最開";
    } else if (gameState === "CALIBRATING_OPEN") {
      openRatio = currentRatio;
      // 門檻設定在 90% 的位置，非常嚴格
      threshold = closeRatio + (openRatio - closeRatio) * 0.9; 
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    // 繪製藍天漸層
    const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grd.addColorStop(0, "#4fc3f7");
    grd.addColorStop(1, "#ffffff");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawCloud(canvas.width * 0.3, 120, 50);
    drawCloud(canvas.width * 0.7, 200, 60);

    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentRatio = getMouthRatio(results.faceLandmarks[0]);
      
      // 判定強化：門檻 且 必須大於閉嘴 2.8 倍
      if (currentRatio > threshold && currentRatio > closeRatio * 2.8) {
        openFrames++;
      } else {
        openFrames = 0;
      }
      isMouthOpen = (openFrames >= REQUIRED_FRAMES);
      drawMouth(isMouthOpen);
    }
    if (gameState === "PLAYING") updateFood(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawCloud(x, y, s) {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI*2);
    ctx.arc(x+s*0.7, y-s*0.3, s*0.9, 0, Math.PI*2);
    ctx.arc(x+s*1.4, y, s, 0, Math.PI*2);
    ctx.fill();
  }

  function drawMouth(open) {
    const w = canvas.width, h = canvas.height;
    const mouthW = w * 0.85, mouthH = open ? h * 0.25 : h * 0.08;
    const centerY = h - (h * 0.15);
    ctx.fillStyle = open ? "#01579b" : "#81d4fa";
    ctx.beginPath();
    ctx.ellipse(w/2, centerY, mouthW/2, mouthH, 0, 0, Math.PI * 2);
    ctx.fill();
    if(open) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 8; ctx.stroke(); }
  }

  function updateFood(isMouthOpen) {
    if (!food.active) {
      food.delayCounter++;
      if (food.delayCounter > 100) {
