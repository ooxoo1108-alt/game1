<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>口腔復健</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker/face_landmarker.js"></script>
  <style>
    /* 確保手機滿版，不產生捲軸 */
    body { margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; font-family: sans-serif; background: #87CEEB; touch-action: none; }
    #video { position: absolute; width: 1px; height: 1px; opacity: 0; }
    #gameCanvas { width: 100vw; height: 100vh; object-fit: cover; display: block; }
    
    /* UI 面板 */
    #ui { position: absolute; top: 20px; left: 20px; z-index: 100; padding: 10px; background: rgba(255,255,255,0.9); border-radius: 12px; border: 2px solid #0288d1; pointer-events: none; }
    .score-board { font-size: 22px; font-weight: bold; color: #0288d1; }

    /* 側邊控制鈕 - 針對拇指位置優化 */
    #side-controls { 
      position: absolute; right: 15px; top: 50%; transform: translateY(-50%); 
      z-index: 200; display: flex; flex-direction: column; gap: 20px;
    }
    .adjust-btn { 
      width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; 
      font-size: 35px; font-weight: bold; color: white; cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    #btn-plus { background: #4caf50; } 
    #btn-minus { background: #f44336; } 

    /* 重置與數值監控 */
    #monitor-bar { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 150; }
    .info-tag { background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid rgba(255,255,255,0.3); }
    #reset-btn { background: #ff9800; color: white; border: none; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

    /* 校準覆蓋層 */
    #msg-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: white; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 1000; text-align: center;
    }
    #start-btn { background: #0288d1; color: white; border: none; padding: 18px 50px; font-size: 24px; border-radius: 30px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="score-board">得分: <span id="score">0</span></div>
  </div>
  
  <div id="side-controls">
    <button id="btn-plus" class="adjust-btn">＋</button>
    <button id="btn-minus" class="adjust-btn">－</button>
  </div>

  <div id="monitor-bar">
    <div class="info-tag">門檻: <span id="thr-val">0.90</span></div>
    <button id="reset-btn">重新校準</button>
  </div>

  <div id="msg-overlay">
    <h2 style="color:#0288d1">🦷 口腔復健遊戲</h2>
    <p id="msg-text">掃描成功！請點擊開始校準</p>
    <button id="start-btn">開始遊戲</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
  </audio>

  <video id="video" autoplay playsinline></video>
  <canvas id="gameCanvas"></canvas>

<script type="module">
  import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";
  const video = document.getElementById("video");
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const thrValEl = document.getElementById("thr-val");
  const startBtn = document.getElementById("start-btn");
  const overlay = document.getElementById("msg-overlay");
  const bgMusic = document.getElementById("bgMusic");

  let faceLandmarker, score = 0, gameState = "LOADING"; 
  let currentRatio = 0, closeRatio = 0.1, openRatio = 0.3;
  let sensitivityOffset = 0.90; 
  let finalThreshold = 0.15;
  let ratioHistory = [];

  const foodIcons = ["🍔", "🍎", "🍓", "🍕", "🍰"];
  const trashIcons = ["💣", "💩", "💀"];
  let item = { x: 0, y: -50, active: false, speed: 6, icon: "🍔", type: "FOOD", delay: 0 };

  async function init() {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task` },
      runningMode: "VIDEO", numFaces: 1
    });
    startCamera();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      render();
    };
  }

  function getMouthRatio(marks) {
    const v = Math.abs(marks[13].y - marks[14].y);
    const h = Math.abs(marks[78].x - marks[308].x);
    let raw = v / h;
    ratioHistory.push(raw);
    if(ratioHistory.length > 5) ratioHistory.shift();
    return ratioHistory.reduce((a,b)=>a+b)/ratioHistory.length;
  }

  document.getElementById("btn-plus").onclick = () => { sensitivityOffset -= 0.15; updateThr(); };
  document.getElementById("btn-minus").onclick = () => { sensitivityOffset += 0.15; updateThr(); };
  document.getElementById("reset-btn").onclick = () => { location.reload(); };

  function updateThr() {
    finalThreshold = closeRatio + (openRatio - closeRatio) * sensitivityOffset;
    thrValEl.innerText = sensitivityOffset.toFixed(2);
  }

  startBtn.onclick = () => {
    bgMusic.play().catch(()=>{});
    if (gameState === "LOADING") {
      gameState = "CAL_CLOSE";
      document.getElementById("msg-text").innerHTML = "步驟 1：請確實<strong>閉緊嘴巴</strong>";
      startBtn.innerText = "擷取閉嘴";
    } else if (gameState === "CAL_CLOSE") {
      closeRatio = currentRatio;
      gameState = "CAL_OPEN";
      document.getElementById("msg-text").innerHTML = "步驟 2：請<strong>張大嘴巴</strong>";
      startBtn.innerText = "擷取張嘴";
    } else if (gameState === "CAL_OPEN") {
      openRatio = currentRatio;
      updateThr();
      gameState = "PLAYING";
      overlay.style.display = "none";
    }
  };

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const results = faceLandmarker.detectForVideo(video, performance.now());
    let isMouthOpen = false;

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      currentRatio = getMouthRatio(results.faceLandmarks[0]);
      if (gameState === "PLAYING") isMouthOpen = (currentRatio > finalThreshold);
      
      // 繪製簡單臉部輪廓確保使用者知道有對準
      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      results.faceLandmarks[0].slice(0,10).forEach((p,i)=>{
        if(i==0) ctx.moveTo(p.x*canvas.width, p.y*canvas.height);
        else ctx.lineTo(p.x*canvas.width, p.y*canvas.height);
      });
      ctx.stroke();
    }
    
    drawMouth(isMouthOpen);
    if (gameState === "PLAYING") updateItem(isMouthOpen);
    requestAnimationFrame(render);
  }

  function drawMouth(open) {
    const w = canvas.width, h = canvas.height;
    const mouthW = w * 0.8, mouthH = open ? h * 0.18 : h * 0.04;
    const centerY = h - 140;
    ctx.fillStyle = open ? "#880e4f" : "#ad1457";
    ctx.beginPath(); ctx.ellipse(w/2, centerY, mouthW/2, mouthH, 0, 0, Math.PI * 2); ctx.fill();
    if(open) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 8; ctx.stroke(); }
  }

  function updateItem(isMouthOpen) {
    if (!item.active) {
      item.delay++;
      if (item.delay > 40) { 
        item.x = Math.random() * (canvas.width - 100) + 50;
        item.y = -50; 
        const isFood = Math.random() > 0.3;
        item.icon = isFood ? foodIcons[Math.floor(Math.random()*foodIcons.length)] : trashIcons[Math.floor(Math.random()*trashIcons.length)];
        item.type = isFood ? "FOOD" : "TRASH";
        item.active = true; item.delay = 0;
      }
      return;
    }
    item.y += item.speed;
    ctx.font = "60px serif"; ctx.textAlign = "center";
    ctx.fillText(item.icon, item.x, item.y);

    if (item.y > canvas.height - 200 && isMouthOpen && item.active) {
        score += (item.type === "FOOD" ? 10 : -20);
        scoreEl.innerText = score; item.active = false;
        if (navigator.vibrate) navigator.vibrate(item.type === "FOOD" ? 50 : 200);
    }
    if (item.y > canvas.height) item.active = false;
  }
  init();
</script>
</body>
</html>
